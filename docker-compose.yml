# Local dependencies for running JobQ. Start with: docker compose up -d
# (Prometheus will be added here in a later phase.)
services:
  redis:
    image: redis:7-alpine
    container_name: jobq-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: jobq-postgres
    environment:
      POSTGRES_USER: jobq
      POSTGRES_PASSWORD: jobq
      POSTGRES_DB: jobq
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobq"]
      interval: 5s
      timeout: 3s
      retries: 5
