# Local dependencies for running JobQ. Start with: docker compose up -d
# (Postgres and Prometheus will be added here in later phases.)
services:
  redis:
    image: redis:7-alpine
    container_name: jobq-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
