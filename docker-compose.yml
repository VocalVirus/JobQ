# The full JobQ stack: dependencies (Redis, Postgres) plus the app itself and
# Prometheus. Start everything with: docker compose up -d --build
# Then: API on :8080, metrics on :8080/metrics, Prometheus UI on :9090.
services:
  redis:
    image: redis:7-alpine
    container_name: jobq-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: jobq-postgres
    environment:
      POSTGRES_USER: jobq
      POSTGRES_PASSWORD: jobq
      POSTGRES_DB: jobq
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobq"]
      interval: 5s
      timeout: 3s
      retries: 5

  # The JobQ service itself, built from the local Dockerfile. It waits for Redis
  # and Postgres to be healthy, then reaches them by service name over the compose
  # network (main.go reads REDIS_ADDR / DATABASE_URL). Port 8080 is published so
  # the host can curl the API and /metrics.
  jobq:
    build: .
    container_name: jobq-app
    ports:
      - "8080:8080"
    environment:
      REDIS_ADDR: redis:6379
      DATABASE_URL: postgres://jobq:jobq@postgres:5432/jobq?sslmode=disable
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Prometheus scrapes JobQ's /metrics endpoint (see prometheus.yml). The UI is
  # on :9090; it waits for JobQ to be healthy so the first scrapes land.
  prometheus:
    image: prom/prometheus:latest
    container_name: jobq-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      jobq:
        condition: service_healthy
